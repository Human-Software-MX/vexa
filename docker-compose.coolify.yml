# Coolify deployment — prebuilt images from DockerHub (no local builds).
# Adapted from deploy/compose/docker-compose.yml for the terceros server:
#   - fixed network name "vexa" so runtime-api can attach bot containers
#   - docker group GID 999 (host value on terceros)
#   - only api-gateway (8056) and dashboard (3001) exposed publicly
name: vexa

services:
  redis:
    image: redis:7.0-alpine
    mem_limit: 512m
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      - vexa
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    command: ["postgres", "-c", "idle_in_transaction_session_timeout=60000"]
    environment:
      - POSTGRES_DB=${DB_NAME:-vexa}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-vexa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - vexa
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    mem_limit: 1g
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    volumes:
      - minio-data:/data
    networks:
      - vexa
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        sleep 5
        mc alias set vexa http://minio:9000 $${MINIO_ROOT_USER:-vexa-access-key} $${MINIO_ROOT_PASSWORD:-vexa-secret-key}
        mc mb --ignore-existing vexa/${MINIO_BUCKET:-vexa}
        exit 0
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-vexa-secret-key}
    networks:
      - vexa
    restart: "no"

  admin-api:
    image: vexaai/admin-api:latest
    ports:
      - "127.0.0.1:8057:8001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-changeme}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vexa
    restart: unless-stopped

  runtime-api:
    image: vexaai/runtime-api:latest
    group_add:
      - "${DOCKER_GID:-999}"
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      - DOCKER_NETWORK=vexa
      - AGENT_IMAGE=${AGENT_IMAGE:-vexaai/vexa-agent:latest}
      - BROWSER_IMAGE=${BROWSER_IMAGE:-vexaai/vexa-bot:latest}
      - REDIS_URL=redis://redis:6379
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL:-}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      - TTS_SERVICE_URL=http://tts-service:8002
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa}
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
      - API_KEYS=${BOT_API_TOKEN:-}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - PROFILES_PATH=/app/profiles.yaml
      - ALLOW_PRIVATE_CALLBACKS=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./services/runtime-api/profiles.yaml:/app/profiles.yaml:ro
    init: true
    depends_on:
      - redis
      - postgres
    networks:
      - vexa
    restart: unless-stopped

  api-gateway:
    image: vexaai/api-gateway:latest
    mem_limit: 1g
    ports:
      - "8056:8000"
    environment:
      - ADMIN_API_URL=http://admin-api:8001
      - MEETING_API_URL=http://meeting-api:8080
      - TRANSCRIPTION_COLLECTOR_URL=http://meeting-api:8080
      - MCP_URL=http://mcp:18888
      - CALENDAR_SERVICE_URL=http://calendar-service:8050
      - AGENT_API_URL=http://agent-api:8100
      - REDIS_URL=redis://redis:6379/0
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - RATE_LIMIT_RPM=${RATE_LIMIT_RPM:-120}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    init: true
    depends_on:
      admin-api:
        condition: service_healthy
      meeting-api:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - vexa
    restart: unless-stopped

  meeting-api:
    image: vexaai/meeting-api:latest
    mem_limit: 1g
    expose:
      - "8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vexa}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_SSL_MODE=disable
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ADMIN_TOKEN=${ADMIN_API_TOKEN:-changeme}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-vexa-internal-secret}
      - RUNTIME_API_URL=http://runtime-api:8090
      - RUNTIME_API_TOKEN=${BOT_API_TOKEN:-}
      - MEETING_API_URL=http://meeting-api:8080
      - BOT_IMAGE_NAME=${BROWSER_IMAGE:-vexaai/vexa-bot:latest}
      - DOCKER_NETWORK=vexa
      - TTS_SERVICE_URL=http://tts-service:8002
      - POST_MEETING_HOOKS=${POST_MEETING_HOOKS:-}
      - TRANSCRIPTION_COLLECTOR_URL=http://meeting-api:8080
      - STORAGE_BACKEND=${STORAGE_BACKEND:-minio}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-vexa-access-key}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-vexa-secret-key}
      - MINIO_BUCKET=${MINIO_BUCKET:-vexa}
      - MINIO_SECURE=false
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-}
      - RECORDING_ENABLED=${RECORDING_ENABLED:-true}
      - CAPTURE_MODES=${CAPTURE_MODES:-audio}
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL:-}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN:-}
      - TRANSCRIPTION_GATEWAY_URL=${TRANSCRIPTION_GATEWAY_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - recordings-data:/data/recordings
    init: true
    depends_on:
      - redis
      - postgres
      - runtime-api
    networks:
      - vexa
    restart: unless-stopped

  mcp:
    image: vexaai/mcp:latest
    mem_limit: 512m
    ports:
      - "127.0.0.1:18888:18888"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    init: true
    depends_on:
      - api-gateway
    networks:
      - vexa
    restart: unless-stopped

  dashboard:
    image: vexaai/dashboard:latest
    mem_limit: 1g
    ports:
      - "3001:3000"
    environment:
      - VEXA_API_URL=http://api-gateway:8000
      - VEXA_PUBLIC_API_URL=${VEXA_PUBLIC_API_URL:-}
      - API_GATEWAY_HOST_PORT=8056
      - VEXA_API_KEY=${VEXA_API_KEY:-}
      - VEXA_ADMIN_API_KEY=${ADMIN_API_TOKEN:-changeme}
      - VEXA_ADMIN_API_URL=http://admin-api:8001
      - JWT_SECRET=${JWT_SECRET:-vexa-dev-jwt-secret}
      - VEXA_AUTH_COOKIE_NAME=${VEXA_AUTH_COOKIE_NAME:-vexa-token-compose}
      - VEXA_USER_INFO_COOKIE_NAME=${VEXA_USER_INFO_COOKIE_NAME:-vexa-user-info-compose}
      - VEXA_ALLOW_DIRECT_LOGIN=${VEXA_ALLOW_DIRECT_LOGIN:-true}
      - MINIO_INTERNAL_ENDPOINT=http://minio:9000
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-}
    init: true
    depends_on:
      - api-gateway
    networks:
      - vexa
    restart: unless-stopped

  tts-service:
    image: vexaai/tts-service:latest
    mem_limit: 1g
    expose:
      - "8002"
    environment:
      - PIPER_DEFAULT_VOICES=${PIPER_DEFAULT_VOICES:-major}
      - PIPER_LOAD_VOICES=${PIPER_LOAD_VOICES:-en_US-amy-medium,es_ES-davefx-medium}
      - PIPER_PRELOAD_STRICT=${PIPER_PRELOAD_STRICT:-true}
      - TTS_API_TOKEN=${TTS_API_TOKEN:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - tts-voices:/app/voices
    init: true
    networks:
      - vexa
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  minio-data:
  recordings-data:
  tts-voices:

networks:
  vexa:
    name: vexa
    driver: bridge
